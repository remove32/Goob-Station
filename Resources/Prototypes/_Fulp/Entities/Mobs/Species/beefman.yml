- type: body
  id: Beefman
  name: beefman
  root: chest
  slots:
    head:
      part: HeadBeefman
      connections:
      - chest
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    chest:
      part: ChestBeefman
      connections:
      - right arm
      - left arm
      - groin
      - head # Shitmed
      organs:
        heart: OrganHumanHeart
        lungs: OrganHumanLungs
    groin:
      part: GroinBeefman
      connections:
      - right leg
      - left leg
      organs:
        stomach: OrganHumanStomach
        liver: OrganHumanLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmBeefman
      connections:
      - right hand
    left arm:
      part: LeftArmBeefman
      connections:
      - left hand
    right hand:
      part: RightHandBeefman
    left hand:
      part: LeftHandBeefman
    right leg:
      part: RightLegBeefman
      connections:
      - right foot
    left leg:
      part: LeftLegBeefman
      connections:
      - left foot
    right foot:
      part: RightFootBeefman
    left foot:
      part: LeftFootBeefman

- type: damageModifierSet
  id: Beefman
  coefficients:
    Blunt: 0.8
    Burn: 0.6
    Cold: 0.0
    Radiation: 1.2
    Asphyxiation: 0.0
    Bloodloss: 1.1
    # Cellular: 0.0 # Goobstation - changelings
  ignoreArmorPierceFlags: All # Goobstation
