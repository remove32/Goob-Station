- type: entity
  save: false
  name: Urist McSteak
  parent: BaseMobSpeciesOrganic
  id: BaseMobBeefman
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Beefman
  - type: Icon
    sprite: _Fulp/Mobs/Species/Beefman/parts.rsi
    state: full
  - type: Body
    prototype: Beefman
    requiredLegs: 2
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Beefman
#  - type: DamageVisuals
#    damageOverlayGroups:
#      Brute:
#        sprite: _Shitmed/Mobs/Effects/brute_damage.rsi
#        color: "#896e55"
#      Burn:
#        sprite: _Shitmed/Mobs/Effects/burn_damage.rsi
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 11
  - type: Bloodstream
    bloodReagent: Blood
  - type: Flammable
    damage:
      types:
        Heat: 1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 100 #fairly light
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  # - type: TypingIndicator
  #   proto: gingerbread
  - type: Inventory
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Fulp/Mobs/Species/Beefman/displacement.rsi
            state: jumpsuit


- type: entity
  parent: BaseSpeciesDummy
  id: MobBeefmanDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: Beefman
