- type: species
  id: Beefman
  name: species-name-beefman
  roundStart: true
  prototype: MobBeefman
  sprites: MobBeefmanSprites
  markingLimits: MobBeefmanMarkingLimits
  skinColoration: Hues
  defaultSkinTone: "#ff1313"
  dollPrototype: MobBeefmanDummy
  sexes:
  - Unsexed

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobBeefmanSprites
  sprites:
    Head: MobBeefmanHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Chest: MobBeefmanChest
    Groin: MobBeefmanGroin
    Eyes: MobHumanoidEyes
    LArm: MobBeefmanLArm
    RArm: MobBeefmanRArm
    LHand: MobBeefmanLHand
    RHand: MobBeefmanRHand
    LLeg: MobBeefmanLLeg
    RLeg: MobBeefmanRLeg
    LFoot: MobBeefmanLFoot
    RFoot: MobBeefmanRFoot

- type: markingPoints
  id: MobBeefmanMarkingLimits
  points:
    Special: # the cat ear joke, its real *godo*
      points: 1
      required: false
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke, its real *godo*
      points: 1
      required: false
    HeadTop:
      points: 1
      required: false
    Chest:
      points: 3
      required: false
    Legs:
      points: 2
      required: false
    Arms:
      points: 2
      required: false

